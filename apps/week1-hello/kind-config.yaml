# kind cluster config for cluster-mental-model project
# 3 nodes so gang-scheduling starvation scenarios (Week 3) actually have
# something to be starved against. 1 control-plane, 2 workers is enough
# to see Volcano refuse a partial start later.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cluster-mental-model
nodes:
  - role: control-plane
  - role: worker
  - role: worker
